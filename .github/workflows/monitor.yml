name: Plaza Delft Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-listings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install deps
        run: pip install -r requirements.txt

      # Random 0-120s jitter so checks land between 5-7 min apart
      - name: Random jitter
        run: sleep $((RANDOM % 121))

      - name: Run single check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SEEN_FILE: "seen_listings.json"
        run: |
          python -c "
          from plaza_monitor import Config, make_session, run_once
          import logging
          logging.basicConfig(level=logging.INFO, format='%(asctime)s  %(message)s')
          config = Config()
          config.validate()
          run_once(config, make_session())
          "

      - name: Commit state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add seen_listings.json
          git diff-index --quiet HEAD || git commit -m "Update seen listings [skip ci]"

      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main